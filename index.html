<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>حبيت اسوي الترند لك</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at center, #0a0508 0%, #000000 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Poppins', 'Arial', system-ui, sans-serif;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* each "I love you" word - forms the heart shape */
    .word-particle {
      position: absolute;
      color: #c41e1e;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 4px #8b0000, 0 0 10px #5e0000;
      opacity: 1;
      z-index: 15;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: opacity 0.25s ease, transform 0.3s ease, text-shadow 0.2s ease;
      will-change: transform, opacity;
    }

    /* gentle appear animation */
    @keyframes gentleAppear {
      0% {
        opacity: 0;
        transform: scale(0.5);
        filter: blur(4px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    /* TRAIN ENGINE - word becomes BRIGHT (the train head) */
    .word-particle.train-engine {
      transform: scale(1.3) translateY(-8px);
      text-shadow: 0 0 15px #ff6666, 0 0 30px #ff2222, 0 0 45px #ff0000;
      color: #ff8888;
      opacity: 1 !important;
      z-index: 20;
      transition: transform 0.2s cubic-bezier(0.2, 1.2, 0.4, 1), text-shadow 0.15s ease;
    }

    /* TRAIL effect - slightly bright (the cars behind engine) */
    .word-particle.train-trail {
      transform: scale(1.08) translateY(-3px);
      text-shadow: 0 0 8px #ff4444, 0 0 15px #cc2222;
      color: #ff5555;
      opacity: 1 !important;
      transition: transform 0.25s ease, text-shadow 0.2s ease;
    }

    /* VANISHING - only 1 or 2 words disappear at a time (right behind the train) */
    .word-particle.train-vanished {
      opacity: 0 !important;
      transform: scale(0.5);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* glowing letter E in the center of the heart */
    .center-letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 95px;
      font-weight: 900;
      font-family: 'Segoe UI', 'Arial Black', 'Impact', sans-serif;
      opacity: 1;
      z-index: 30;
      text-shadow: 0 0 20px #a81c1c, 0 0 35px #6d0e0e, 0 0 55px #3a0303, 0 0 80px #8b0000;
      color: #d42a2a;
      letter-spacing: 8px;
      pointer-events: none;
      white-space: pre;
      background: none;
      animation: eGlowPulse 2s ease-in-out infinite alternate;
    }

    @keyframes eGlowPulse {
      0% {
        text-shadow: 0 0 20px #a81c1c, 0 0 35px #6d0e0e, 0 0 55px #3a0303;
        transform: translate(-50%, -50%) scale(0.98);
      }
      100% {
        text-shadow: 0 0 35px #ff5555, 0 0 60px #c12727, 0 0 90px #8b0000, 0 0 120px #a11a1a;
        transform: translate(-50%, -50%) scale(1.02);
      }
    }

    /* subtle floating animation */
    @keyframes softFloat {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-2px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    /* responsive */
    @media (max-width: 700px) {
      .word-particle {
        font-size: 10px;
      }
      .center-letter {
        font-size: 65px;
        letter-spacing: 5px;
      }
    }

    @media (max-width: 480px) {
      .word-particle {
        font-size: 8px;
      }
      .center-letter {
        font-size: 50px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>
<div class="container" id="container">
  <div class="center-letter" id="heartLetterE">E</div>
</div>

<script>
  (function() {
    const container = document.getElementById('container');
    const centerE = document.getElementById('heartLetterE');
    
    // ==================== HEART SHAPE EQUATION ====================
    const heartPoints = [];
    
    // Generate points around the heart perimeter
    for (let t = 0; t < Math.PI * 2; t += 0.048) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      heartPoints.push({ x, y });
    }
    
    // Sort by angle for continuous train movement around the heart
    heartPoints.sort((a, b) => {
      const angleA = Math.atan2(a.y, a.x);
      const angleB = Math.atan2(b.y, b.x);
      return angleA - angleB;
    });
    
    const totalWords = heartPoints.length;
    
    // Heart scaling
    let heartScale = 24;
    let centerX = window.innerWidth / 2;
    let centerY = window.innerHeight / 2;
    
    // Store word elements
    let wordElements = [];
    let trainInterval = null;
    let currentTrainPos = 0;
    
    // Train configuration - ONLY 1 or 2 words vanish at a time!
    const TRAIL_LENGTH = 4;        // Number of glowing words behind engine (trail)
    const VANISH_COUNT = 2;        // ONLY 2 words disappear at a time (right behind the trail)
    const STEP_DELAY = 75;         // milliseconds between steps
    
    // ==================== CREATE WORDS ON HEART ====================
    function createWordsOnHeart() {
      heartPoints.forEach((point, idx) => {
        const word = document.createElement('div');
        word.className = 'word-particle';
        word.innerText = 'I love you';
        
        // Dark rich red base
        const redValue = 170 + Math.floor(Math.random() * 50);
        word.style.color = `rgb(${redValue}, 35, 35)`;
        
        // Position
        const leftPos = centerX + point.x * heartScale;
        const topPos = centerY - point.y * heartScale;
        word.style.left = `${leftPos}px`;
        word.style.top = `${topPos}px`;
        
        // Appearance animation with floating
        word.style.animation = `gentleAppear 0.4s ease forwards ${idx * 0.012}s, softFloat 3s ease-in-out infinite ${(idx % 9) * 0.3}s`;
        
        container.appendChild(word);
        wordElements.push(word);
      });
    }
    
    // ==================== CLEAR ALL TRAIN CLASSES ====================
    function clearAllEffects() {
      wordElements.forEach(word => {
        word.classList.remove('train-engine', 'train-trail', 'train-vanished');
        word.style.opacity = '';
      });
    }
    
    // ==================== APPLY TRAIN EFFECT ====================
    // Only 1-2 words vanish at a time (the ones immediately after the trail)
    
    function applyTrainAtPosition(engineIndex) {
      // Clear all effects from ALL words first
      wordElements.forEach(word => {
        word.classList.remove('train-engine', 'train-trail', 'train-vanished');
        word.style.opacity = '';
      });
      
      // 1. ENGINE ZONE (the main bright word)
      const engineWord = wordElements[engineIndex];
      if (engineWord) {
        engineWord.classList.add('train-engine');
        // Quick flash
        engineWord.style.color = '#ffaaaa';
        setTimeout(() => {
          if (engineWord) engineWord.style.color = '';
        }, 100);
      }
      
      // 2. TRAIL ZONE (glowing words behind the engine - visible and bright)
      for (let offset = 1; offset <= TRAIL_LENGTH; offset++) {
        const trailIndex = (engineIndex - offset + totalWords) % totalWords;
        const trailWord = wordElements[trailIndex];
        if (trailWord) {
          trailWord.classList.add('train-trail');
        }
      }
      
      // 3. VANISHING ZONE (ONLY 1-2 words disappear - right behind the trail)
      for (let offset = TRAIL_LENGTH + 1; offset <= TRAIL_LENGTH + VANISH_COUNT; offset++) {
        const vanishIndex = (engineIndex - offset + totalWords) % totalWords;
        const vanishWord = wordElements[vanishIndex];
        if (vanishWord) {
          vanishWord.classList.add('train-vanished');
        }
      }
      
      // Small pulse on E letter for dramatic effect
      if (engineIndex % 30 === 0) {
        centerE.style.animation = 'none';
        centerE.style.transform = 'translate(-50%, -50%) scale(1.05)';
        setTimeout(() => {
          if (centerE) {
            centerE.style.animation = 'eGlowPulse 2s ease-in-out infinite alternate';
            centerE.style.transform = 'translate(-50%, -50%) scale(1)';
          }
        }, 200);
      }
    }
    
    // ==================== START TRAIN ANIMATION ====================
    function startTrainAnimation() {
      if (trainInterval) clearInterval(trainInterval);
      
      let enginePosition = 0;
      
      trainInterval = setInterval(() => {
        // Move train forward
        enginePosition = (enginePosition + 1) % totalWords;
        currentTrainPos = enginePosition;
        applyTrainAtPosition(enginePosition);
      }, STEP_DELAY);
    }
    
    // ==================== RESPONSIVE REPOSITIONING ====================
    function repositionHeart() {
      centerX = window.innerWidth / 2;
      centerY = window.innerHeight / 2;
      
      wordElements.forEach((word, idx) => {
        if (!word.parentNode) return;
        const point = heartPoints[idx];
        if (!point) return;
        
        const newLeft = centerX + point.x * heartScale;
        const newTop = centerY - point.y * heartScale;
        
        word.style.left = `${newLeft}px`;
        word.style.top = `${newTop}px`;
      });
      
      // Keep E centered
      centerE.style.left = '50%';
      centerE.style.top = '50%';
      centerE.style.transform = 'translate(-50%, -50%)';
    }
    
    // ==================== ADD SPARKLES ====================
    function addHeartSparkles() {
      const sparkleColors = ['#ff4444', '#ff6666', '#cc3333', '#ff7777'];
      for (let i = 0; i < 60; i++) {
        const sparkle = document.createElement('div');
        sparkle.style.position = 'absolute';
        sparkle.style.width = '2px';
        sparkle.style.height = '2px';
        sparkle.style.backgroundColor = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
        sparkle.style.borderRadius = '50%';
        sparkle.style.pointerEvents = 'none';
        sparkle.style.opacity = '0';
        sparkle.style.zIndex = '5';
        
        const angle = Math.random() * Math.PI * 2;
        const radius = 150 + Math.random() * 90;
        const offsetX = Math.cos(angle) * radius;
        const offsetY = Math.sin(angle) * radius * 0.8;
        
        sparkle.style.left = `calc(50% + ${offsetX}px)`;
        sparkle.style.top = `calc(50% + ${offsetY}px)`;
        
        sparkle.style.animation = `sparkleFade ${0.8 + Math.random() * 1.5}s ease-in-out infinite ${Math.random() * 2}s`;
        container.appendChild(sparkle);
      }
      
      if (!document.querySelector('#sparkleStyle')) {
        const style = document.createElement('style');
        style.id = 'sparkleStyle';
        style.textContent = `
          @keyframes sparkleFade {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1.5); box-shadow: 0 0 6px #ff6666; }
            100% { opacity: 0; transform: scale(0); }
          }
        `;
        document.head.appendChild(style);
      }
    }
    
    // ==================== INITIALIZE ====================
    createWordsOnHeart();
    
    setTimeout(() => {
      repositionHeart();
      addHeartSparkles();
      
      setTimeout(() => {
        startTrainAnimation();
      }, 1000);
    }, 150);
    
    window.addEventListener('resize', () => {
      repositionHeart();
      setTimeout(() => repositionHeart(), 50);
    });
    
    console.log(`❤️ Heart with ${totalWords} "I love you" words. Train moves around — only 1-2 words vanish at a time!`);
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>حبيت اسوي الترند لك</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at center, #0a0508 0%, #000000 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Poppins', 'Arial', system-ui, sans-serif;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* each "I love you" word - forms the heart shape */
    .word-particle {
      position: absolute;
      color: #c41e1e;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 4px #8b0000, 0 0 10px #5e0000;
      opacity: 1;
      z-index: 15;
      letter-spacing: 0.3px;
      transition: text-shadow 0.3s ease, color 0.25s ease;
      will-change: transform;
    }

    /* gentle appear animation */
    @keyframes gentleAppear {
      0% {
        opacity: 0;
        transform: scale(0.5);
        filter: blur(4px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    /* TRAIL effect - words glow as the trail passes through them */
    .word-particle.train-trail {
      text-shadow: 0 0 10px #ff5555, 0 0 22px #ff2222, 0 0 35px #ff0000;
      color: #ff8888;
      transition: text-shadow 0.25s ease, color 0.2s ease;
    }

    /* subtle floating animation for all words */
    @keyframes softFloat {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-2px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    /* responsive */
    @media (max-width: 700px) {
      .word-particle {
        font-size: 10px;
      }
    }

    @media (max-width: 480px) {
      .word-particle {
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
<div class="container" id="container"></div>

<script>
  (function() {
    const container = document.getElementById('container');
    
    // ==================== HEART SHAPE EQUATION ====================
    const heartPoints = [];
    
    // Generate points around the heart perimeter
    for (let t = 0; t < Math.PI * 2; t += 0.048) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      heartPoints.push({ x, y });
    }
    
    // Sort by angle for continuous trail movement around the heart
    heartPoints.sort((a, b) => {
      const angleA = Math.atan2(a.y, a.x);
      const angleB = Math.atan2(b.y, b.x);
      return angleA - angleB;
    });
    
    const totalWords = heartPoints.length;
    
    // Heart scaling
    let heartScale = 24;
    let centerX = window.innerWidth / 2;
    let centerY = window.innerHeight / 2;
    
    // Store word elements
    let wordElements = [];
    let trailInterval = null;
    
    // Trail configuration - just a glowing trail (no engine, no vanish, no squeeze)
    const TRAIL_LENGTH = 8;        // Number of glowing words in the trail
    const STEP_DELAY = 100;        // Speed of trail movement (ms)
    
    // ==================== CREATE WORDS ON HEART ====================
    function createWordsOnHeart() {
      heartPoints.forEach((point, idx) => {
        const word = document.createElement('div');
        word.className = 'word-particle';
        word.innerText = 'I love you';
        
        // Dark rich red base color
        const redValue = 170 + Math.floor(Math.random() * 50);
        word.style.color = `rgb(${redValue}, 35, 35)`;
        
        // Position
        const leftPos = centerX + point.x * heartScale;
        const topPos = centerY - point.y * heartScale;
        word.style.left = `${leftPos}px`;
        word.style.top = `${topPos}px`;
        
        // Appearance animation with gentle floating
        const floatDelay = (idx % 9) * 0.3;
        word.style.animation = `gentleAppear 0.4s ease forwards ${idx * 0.012}s, softFloat 3s ease-in-out infinite ${floatDelay}s`;
        
        container.appendChild(word);
        wordElements.push(word);
      });
    }
    
    // ==================== CLEAR ALL TRAIL CLASSES ====================
    function clearAllEffects() {
      wordElements.forEach(word => {
        word.classList.remove('train-trail');
      });
    }
    
    // ==================== APPLY TRAIL EFFECT ====================
    // Just a glowing trail that moves around the heart (no engine word)
    
    let currentHeadPosition = 0;
    
    function applyTrailAtPosition(headIndex) {
      // Clear all trail effects
      wordElements.forEach(word => {
        word.classList.remove('train-trail');
      });
      
      // Apply glow to a range of words (the trail)
      for (let offset = 0; offset < TRAIL_LENGTH; offset++) {
        const trailIndex = (headIndex - offset + totalWords) % totalWords;
        const trailWord = wordElements[trailIndex];
        if (trailWord) {
          trailWord.classList.add('train-trail');
        }
      }
    }
    
    // ==================== START TRAIL ANIMATION ====================
    function startTrailAnimation() {
      if (trailInterval) clearInterval(trailInterval);
      
      let headPosition = 0;
      
      trailInterval = setInterval(() => {
        // Move trail head forward
        headPosition = (headPosition + 1) % totalWords;
        currentHeadPosition = headPosition;
        applyTrailAtPosition(headPosition);
      }, STEP_DELAY);
    }
    
    // ==================== RESPONSIVE REPOSITIONING ====================
    function repositionHeart() {
      centerX = window.innerWidth / 2;
      centerY = window.innerHeight / 2;
      
      wordElements.forEach((word, idx) => {
        if (!word.parentNode) return;
        const point = heartPoints[idx];
        if (!point) return;
        
        const newLeft = centerX + point.x * heartScale;
        const newTop = centerY - point.y * heartScale;
        
        word.style.left = `${newLeft}px`;
        word.style.top = `${newTop}px`;
      });
    }
    
    // ==================== ADD SPARKLES ====================
    function addHeartSparkles() {
      const sparkleColors = ['#ff4444', '#ff6666', '#cc3333', '#ff7777'];
      for (let i = 0; i < 60; i++) {
        const sparkle = document.createElement('div');
        sparkle.style.position = 'absolute';
        sparkle.style.width = '2px';
        sparkle.style.height = '2px';
        sparkle.style.backgroundColor = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
        sparkle.style.borderRadius = '50%';
        sparkle.style.pointerEvents = 'none';
        sparkle.style.opacity = '0';
        sparkle.style.zIndex = '5';
        
        const angle = Math.random() * Math.PI * 2;
        const radius = 150 + Math.random() * 90;
        const offsetX = Math.cos(angle) * radius;
        const offsetY = Math.sin(angle) * radius * 0.8;
        
        sparkle.style.left = `calc(50% + ${offsetX}px)`;
        sparkle.style.top = `calc(50% + ${offsetY}px)`;
        
        sparkle.style.animation = `sparkleFade ${0.8 + Math.random() * 1.5}s ease-in-out infinite ${Math.random() * 2}s`;
        container.appendChild(sparkle);
      }
      
      if (!document.querySelector('#sparkleStyle')) {
        const style = document.createElement('style');
        style.id = 'sparkleStyle';
        style.textContent = `
          @keyframes sparkleFade {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1.5); box-shadow: 0 0 6px #ff6666; }
            100% { opacity: 0; transform: scale(0); }
          }
        `;
        document.head.appendChild(style);
      }
    }
    
    // ==================== INITIALIZE ====================
    createWordsOnHeart();
    
    setTimeout(() => {
      repositionHeart();
      addHeartSparkles();
      
      setTimeout(() => {
        startTrailAnimation();
      }, 1000);
    }, 150);
    
    window.addEventListener('resize', () => {
      repositionHeart();
      setTimeout(() => repositionHeart(), 50);
    });
    
    console.log(`❤️ Heart with ${totalWords} "I love you" words. A glowing trail moves around the heart!`);
  })();
</script>
</body>
</html>

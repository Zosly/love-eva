<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purple Heart Animation</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: black;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .text {
      position: absolute;
      color: #b266ff;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0;
      user-select: none;
      text-shadow:
        0 0 5px #b266ff,
        0 0 10px #b266ff,
        0 0 20px #b266ff;

      animation: drawHeart 0.5s forwards, glow 2s infinite alternate;
    }

    .center-letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #c77dff;
      font-size: 120px;
      font-weight: bold;
      opacity: 0;
      z-index: 10;

      text-shadow:
        0 0 10px #c77dff,
        0 0 20px #c77dff,
        0 0 40px #c77dff,
        0 0 80px #c77dff;

      animation: showE 2s ease forwards 3s;
    }

    @keyframes drawHeart {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.5);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 5px #b266ff,
          0 0 10px #b266ff;
      }

      to {
        text-shadow:
          0 0 10px #d9a3ff,
          0 0 20px #d9a3ff,
          0 0 40px #d9a3ff;
      }
    }

    @keyframes showE {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }

      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }
  </style>
</head>
<body>

  <div class="container" id="container">
    <div class="center-letter">E</div>
  </div>

  <script>
    const container = document.getElementById("container");

    let points = [];

    // Heart equation
    for (let t = 0; t < Math.PI * 2; t += 0.06) {
      const x = 16 * Math.pow(Math.sin(t), 3);

      const y =
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t);

      points.push({ x, y });
    }

    // Sort from bottom to top for drawing effect
    points.sort((a, b) => a.y - b.y);

    points.forEach((point, index) => {
      const text = document.createElement("div");
      text.className = "text";
      text.innerText = "I love you";

      const posX = window.innerWidth / 2 + point.x * 25;
      const posY = window.innerHeight / 2 - point.y * 25;

      text.style.left = `${posX}px`;
      text.style.top = `${posY}px`;

      // Draw animation delay
      text.style.animationDelay = `${index * 0.05}s`;

      container.appendChild(text);
    });
  </script>

</body>
</html>
